# Cloudflare Worker configuration — project: taher-bagh-tournament
# Deploys automatically on push to main via the Worker's git integration.
name = "taher-bagh-tournament"
main = "src/worker.js"
compatibility_date = "2026-07-01"

# Static site lives in public/ — everything in it is uploaded as-is.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# SHA-256 hash of the organiser password (the password itself is never
# stored in the repo). To change the password:
#   printf '%s' 'your-new-password' | sha256sum
# then replace the value below and push — the next deploy applies it.
[vars]
ADMIN_PASSWORD_HASH = "ad89f0b42ca628c58ed4abf016fe5f325c958a6c34dc8b1d8945f8c26169834f"

# Tournament state lives in a single SQLite-backed Durable Object —
# created automatically on deploy, no dashboard setup required.
[[durable_objects.bindings]]
name = "TOURNAMENT_DO"
class_name = "TournamentState"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TournamentState"]
