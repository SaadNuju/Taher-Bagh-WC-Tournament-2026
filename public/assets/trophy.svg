<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340" role="img" aria-label="Gold championship trophy">
  <defs>
    <!-- polished metal gold: bright top rim → warm body → deep shadow -->
    <linearGradient id="gMetal" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#fffbe8"/>
      <stop offset="0.14" stop-color="#ffe98a"/>
      <stop offset="0.34" stop-color="#f6c945"/>
      <stop offset="0.52" stop-color="#e3a91d"/>
      <stop offset="0.72" stop-color="#bd8410"/>
      <stop offset="0.88" stop-color="#8f6109"/>
      <stop offset="1" stop-color="#5f3f05"/>
    </linearGradient>
    <linearGradient id="gMetalV" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#fff4bf"/>
      <stop offset="0.4" stop-color="#f0bd34"/>
      <stop offset="0.7" stop-color="#c1870f"/>
      <stop offset="1" stop-color="#6e4a06"/>
    </linearGradient>
    <radialGradient id="gSphere" cx="0.35" cy="0.28" r="0.85">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.16" stop-color="#fff1b0"/>
      <stop offset="0.45" stop-color="#f3c440"/>
      <stop offset="0.75" stop-color="#c98d14"/>
      <stop offset="1" stop-color="#6f4d08"/>
    </radialGradient>
    <linearGradient id="gBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f8a57"/>
      <stop offset="0.5" stop-color="#186b40"/>
      <stop offset="0.5" stop-color="#0f4227"/>
      <stop offset="1" stop-color="#082a18"/>
    </linearGradient>
    <radialGradient id="gGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe07a" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffe07a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#fff4cf" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="100" cy="128" rx="100" ry="132" fill="url(#gGlow)"/>

  <!-- ===== globe held aloft ===== -->
  <circle cx="100" cy="66" r="49" fill="url(#gSphere)" stroke="#6f4d08" stroke-width="1.4"/>
  <!-- meridians / parallels -->
  <g stroke="#7c5608" stroke-width="1.1" fill="none" opacity="0.5">
    <ellipse cx="100" cy="66" rx="49" ry="18"/>
    <ellipse cx="100" cy="66" rx="22" ry="49"/>
    <ellipse cx="100" cy="66" rx="40" ry="49"/>
    <line x1="51" y1="66" x2="149" y2="66"/>
  </g>
  <!-- inner shadow crescent for roundness -->
  <path d="M132 40 A49 49 0 0 1 128 106 A44 44 0 0 0 132 40 Z" fill="#6f4d08" opacity="0.35"/>
  <!-- bright specular hotspots -->
  <ellipse cx="80" cy="44" rx="18" ry="12" fill="#fffdf4" opacity="0.85"/>
  <circle cx="72" cy="38" r="4.5" fill="#ffffff"/>
  <ellipse cx="116" cy="88" rx="8" ry="4.5" fill="#fff2bf" opacity="0.45"/>

  <!-- ===== twin figures spiralling up to the globe ===== -->
  <path d="M100 116
           C 67 152, 56 118, 72 90
           C 84 71, 98 79, 100 102
           C 102 79, 116 71, 128 90
           C 144 118, 133 152, 100 116 Z"
        fill="url(#gMetal)" stroke="#6f4d08" stroke-width="1.4"/>
  <!-- central spiral column -->
  <path d="M100 110 C 86 132, 82 154, 100 178 C 118 154, 114 132, 100 110 Z"
        fill="url(#gMetalV)" stroke="#6f4d08" stroke-width="1.1"/>
  <!-- shaded side for depth -->
  <path d="M100 116 C 118 118, 132 138, 122 160 C 118 140, 110 126, 100 120 Z"
        fill="#6f4d08" opacity="0.28"/>

  <!-- stem -->
  <path d="M89 178 h22 l-4 34 h-14 z" fill="url(#gMetal)" stroke="#6f4d08" stroke-width="1.1"/>

  <!-- ===== green + gold base ===== -->
  <ellipse cx="100" cy="214" rx="37" ry="10" fill="url(#gMetalV)" stroke="#6f4d08" stroke-width="1.2"/>
  <path d="M63 214 q37 20 74 0 v13 q-37 20 -74 0 z" fill="url(#gBase)" stroke="#082a18" stroke-width="1"/>
  <ellipse cx="100" cy="227" rx="37" ry="10" fill="url(#gMetal)" stroke="#6f4d08" stroke-width="1"/>
  <path d="M57 231 q43 22 86 0 v15 q-43 22 -86 0 z" fill="url(#gBase)" stroke="#082a18" stroke-width="1"/>
  <ellipse cx="100" cy="246" rx="43" ry="12" fill="url(#gMetalV)" stroke="#6f4d08" stroke-width="1.4"/>
  <ellipse cx="100" cy="246" rx="43" ry="12" fill="none" stroke="#fff4bf" stroke-width="1" opacity="0.55"/>

  <!-- ===== glossy sheen streaks over the whole piece ===== -->
  <path d="M84 116 C 75 140, 78 160, 92 182" fill="none" stroke="url(#gSheen)" stroke-width="3.6" opacity="0.8" stroke-linecap="round"/>
  <path d="M110 118 C 118 136, 116 152, 106 170" fill="none" stroke="#fff6d8" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M96 120 C 92 152, 95 184, 99 210" fill="none" stroke="#fff2b0" stroke-width="1.1" opacity="0.4" stroke-linecap="round"/>
</svg>
