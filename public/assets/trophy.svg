<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340" role="img" aria-label="Gold championship trophy">
  <defs>
    <!-- rich, high-contrast polished gold -->
    <linearGradient id="tbGold" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#fff7cf"/>
      <stop offset="0.18" stop-color="#ffe98a"/>
      <stop offset="0.4" stop-color="#f4c542"/>
      <stop offset="0.58" stop-color="#e0a81f"/>
      <stop offset="0.78" stop-color="#c68a12"/>
      <stop offset="1" stop-color="#8a5f0c"/>
    </linearGradient>
    <linearGradient id="tbGoldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="0.5" stop-color="#eeb92e"/>
      <stop offset="1" stop-color="#9c6f12"/>
    </linearGradient>
    <linearGradient id="tbBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c5a38"/>
      <stop offset="0.5" stop-color="#0f4227"/>
      <stop offset="1" stop-color="#08301b"/>
    </linearGradient>
    <radialGradient id="tbSphere" cx="0.36" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fffbe6"/>
      <stop offset="0.35" stop-color="#ffe27a"/>
      <stop offset="0.7" stop-color="#e6a91e"/>
      <stop offset="1" stop-color="#8f6510"/>
    </radialGradient>
    <radialGradient id="tbGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdf6e" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffdf6e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tbShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ambient glow -->
  <ellipse cx="100" cy="130" rx="98" ry="128" fill="url(#tbGlow)"/>

  <!-- globe held aloft -->
  <circle cx="100" cy="66" r="48" fill="url(#tbSphere)" stroke="#7c5608" stroke-width="1.5"/>
  <g stroke="#a9781a" stroke-width="1.3" fill="none" opacity="0.65">
    <ellipse cx="100" cy="66" rx="48" ry="18"/>
    <ellipse cx="100" cy="66" rx="21" ry="48"/>
    <ellipse cx="100" cy="66" rx="39" ry="48"/>
    <line x1="52" y1="66" x2="148" y2="66"/>
  </g>
  <!-- glossy highlight on globe -->
  <ellipse cx="82" cy="46" rx="17" ry="11" fill="#fffdf2" opacity="0.75"/>
  <ellipse cx="118" cy="86" rx="9" ry="5" fill="#fff3c0" opacity="0.4"/>

  <!-- twin figures spiralling up to hold the globe -->
  <path d="M100 116
           C 68 150, 58 118, 73 92
           C 84 73, 97 80, 100 102
           C 103 80, 116 73, 127 92
           C 142 118, 132 150, 100 116 Z"
        fill="url(#tbGold)" stroke="#7c5608" stroke-width="1.5"/>
  <path d="M100 110 C 87 132, 83 152, 100 174 C 117 152, 113 132, 100 110 Z"
        fill="url(#tbGoldV)" stroke="#7c5608" stroke-width="1.2"/>

  <!-- stem -->
  <path d="M89 174 h22 l-4 36 h-14 z" fill="url(#tbGold)" stroke="#7c5608" stroke-width="1.2"/>

  <!-- base: green malachite tiers with bright gold rings -->
  <ellipse cx="100" cy="214" rx="36" ry="10" fill="url(#tbGoldV)" stroke="#7c5608" stroke-width="1.2"/>
  <path d="M64 214 q36 20 72 0 v13 q-36 20 -72 0 z" fill="url(#tbBase)" stroke="#08301b" stroke-width="1"/>
  <ellipse cx="100" cy="227" rx="36" ry="10" fill="url(#tbGold)" stroke="#7c5608" stroke-width="1"/>
  <path d="M58 231 q42 22 84 0 v15 q-42 22 -84 0 z" fill="url(#tbBase)" stroke="#08301b" stroke-width="1"/>
  <ellipse cx="100" cy="246" rx="42" ry="12" fill="url(#tbGoldV)" stroke="#7c5608" stroke-width="1.4"/>
  <ellipse cx="100" cy="246" rx="42" ry="12" fill="none" stroke="#fff3b0" stroke-width="1" opacity="0.5"/>

  <!-- bright specular shine streaks for a polished-metal look -->
  <path d="M86 118 C 78 138, 80 156, 92 176" fill="none" stroke="url(#tbShine)" stroke-width="3.2" opacity="0.75" stroke-linecap="round"/>
  <path d="M112 120 C 118 136, 116 150, 108 166" fill="none" stroke="#fff6d8" stroke-width="1.6" opacity="0.5" stroke-linecap="round"/>
  <path d="M96 120 C 92 150, 94 180, 99 208" fill="none" stroke="#fff3b0" stroke-width="1.2" opacity="0.45" stroke-linecap="round"/>
</svg>
