<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TBFOOT World Cup Tournament 2026 — 32 teams, knockout format: teams, bracket, schedule, awards and the official draw.">
  <title>TBFOOT World Cup Tournament 2026</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <link rel="stylesheet" href="assets/vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <div id="splash-screen" class="splash-screen" aria-hidden="true">
    <img src="assets/tournament-logo.png" alt="" class="splash-logo">
  </div>

  <div class="stadium-bg" aria-hidden="true">
    <div class="stadium-glow glow-1"></div>
    <div class="stadium-glow glow-2"></div>
    <div class="stadium-beam beam-1"></div>
    <div class="stadium-beam beam-2"></div>
    <div class="stadium-beam beam-3"></div>
    <div id="particles" class="particles"></div>
  </div>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-trophy" aria-hidden="true"><img src="assets/tournament-logo.png" alt=""></div>
      <div class="header-titles">
        <h1 class="header-title">TBFOOT</h1>
        <p class="header-subtitle">WORLD CUP TOURNAMENT 2026</p>
        <div class="header-live">
          <span class="live-pill"><span class="live-dot"></span>LIVE</span>
          <span id="live-ticker" class="live-text">32 TEAMS · KNOCKOUT · ONE CHAMPION</span>
        </div>
      </div>
      <div class="header-badge" aria-hidden="true">
        <div class="badge-ring">
          <i class="fa-solid fa-futbol"></i>
          <span class="badge-line1">TBFOOT</span>
          <span class="badge-line2">WORLD CUP</span>
          <span class="badge-line3">2026</span>
        </div>
      </div>
    </div>
    <a href="#admin" class="header-admin" title="Organiser control panel" aria-label="Admin"><i class="fa-solid fa-lock"></i></a>
  </header>

  <div class="sponsor-banner sponsor-banner-xl" aria-label="Sponsors">
    <div class="sponsor-label"><span class="live-dot"></span> LIVE SPONSORS</div>
    <div class="sponsor-track-wrap">
      <div id="sponsor-track" class="sponsor-track"></div>
    </div>
  </div>

  <nav class="main-nav" aria-label="Main navigation">
    <a href="#home" data-route="home" class="nav-link active" title="Tournament home &amp; sponsors"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#teams" data-route="teams" class="nav-link" title="All 32 squads, captains &amp; players"><i class="fa-solid fa-people-group"></i><span>Teams &amp; Rosters</span></a>
    <a href="#bracket" data-route="bracket" class="nav-link" title="The knockout tree, round by round"><i class="fa-solid fa-sitemap"></i><span>Brackets</span></a>
    <a href="#schedule" data-route="schedule" class="nav-link" title="Kickoff times, round by round"><i class="fa-regular fa-clock"></i><span>Schedule</span></a>
    <a href="#awards" data-route="awards" class="nav-link" title="Golden Boot, Golden Glove &amp; favourites"><i class="fa-solid fa-medal"></i><span>Leaderboard</span></a>
    <a href="#draw" data-route="draw" class="nav-link" data-admin-only title="Run the official draw (organiser only)" hidden><i class="fa-solid fa-shuffle"></i><span>Draw</span></a>
    <a href="#admin" data-route="admin" class="nav-link" title="Organiser control panel"><i class="fa-solid fa-lock"></i><span>Admin</span></a>
  </nav>

  <main id="app">
    <section id="view-home" class="view"></section>
    <section id="view-teams" class="view" hidden></section>
    <section id="view-bracket" class="view" hidden></section>
    <section id="view-schedule" class="view" hidden></section>
    <section id="view-awards" class="view" hidden></section>
    <section id="view-draw" class="view" hidden></section>
    <section id="view-admin" class="view" hidden></section>
  </main>

  <nav class="bottom-nav" aria-label="App navigation">
    <a href="#home" data-route="home" class="nav-link bn-link active"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="#teams" data-route="teams" class="nav-link bn-link"><i class="fa-solid fa-people-group"></i><span>Teams</span></a>
    <a href="#bracket" data-route="bracket" class="nav-link bn-link"><i class="fa-solid fa-sitemap"></i><span>Bracket</span></a>
    <a href="#schedule" data-route="schedule" class="nav-link bn-link"><i class="fa-regular fa-clock"></i><span>Schedule</span></a>
    <a href="#awards" data-route="awards" class="nav-link bn-link"><i class="fa-solid fa-medal"></i><span>Leaders</span></a>
    <a href="#draw" data-route="draw" class="nav-link bn-link" data-admin-only hidden><i class="fa-solid fa-shuffle"></i><span>Draw</span></a>
  </nav>

  <footer class="site-footer">
    <p class="footer-title">TBFOOT WORLD CUP TOURNAMENT 2026</p>
    <p class="footer-tagline">A CELEBRATION OF FOOTBALL, UNITY &amp; PASSION</p>
    <button id="sound-toggle" class="sound-toggle" type="button" aria-label="Toggle sound">
      <i class="fa-solid fa-music"></i> DRAW THEME <i id="sound-icon" class="fa-solid fa-volume-high"></i>
    </button>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script src="js/vendor/gsap.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/bracket.js"></script>
  <script src="js/teams.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/awards.js"></script>
  <script src="js/draw.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
